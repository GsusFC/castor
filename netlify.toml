[build]
  command = "npm install --no-save --os=linux --cpu=x64 @libsql/linux-x64-gnu@0.5.10 || true; npm run build"
  publish = ".next"

[functions]
  external_node_modules = ["@libsql/client", "libsql", "@libsql/linux-x64-gnu", "@libsql/linux-x64-musl"]

[functions."analyze-cast-performance"]
  schedule = "@hourly"

[functions."scheduled-publish"]
  schedule = "* * * * *"

[functions."cron-watchdog"]
  schedule = "*/5 * * * *"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'strict-dynamic'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-src 'self' https://relay.farcaster.xyz https://warpcast.com; frame-ancestors 'none'; upgrade-insecure-requests;"
# CSP managed dynamically by middleware with per-request nonces.
# Netlify headers serve as fallback for static assets and edge cases.
